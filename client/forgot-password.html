<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneHive | Forgot Password</title>
    <!-- Plus Jakarta Sans for premium SaaS typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="mobile-nav.css">

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-init.js"></script>

    <!-- Multi-Language & Theme Support -->
    <script src="theme.js"></script>
    <script src="translations.js"></script>
    <script src="i18n.js"></script>
    <script src="config.js"></script>

    <!-- EmailJS for sending emails (Free tier) -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        // TODO: Replace with your actual EmailJS Public Key if you set it up
        (function () {
            emailjs.init("YOUR_EMAILJS_PUBLIC_KEY");
        })();
    </script>

    <style>
        :root {
            --bg-base: #050b14;
            --bg-gradient: radial-gradient(circle at 10% 90%, rgba(37, 99, 235, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 90% 10%, rgba(37, 99, 235, 0.05) 0%, transparent 40%);
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --accent: #3B82F6;
            --accent-hover: #2563EB;
            --danger: #EF4444;
            --success: #10B981;
            --surface: rgba(255, 255, 255, 0.02);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-active: rgba(59, 130, 246, 0.5);
            --radius-md: 12px;
            --radius-lg: 24px;
            --radius-pill: 9999px;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        [data-theme="light"] {
            --bg-base: #F8FAFC;
            --bg-gradient: radial-gradient(circle at 10% 90%, rgba(241, 112, 36, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 10%, rgba(241, 112, 36, 0.05) 0%, transparent 40%);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --surface: rgba(255, 255, 255, 0.9);
            --surface-glass: rgba(255, 255, 255, 0.8);
            --border-subtle: rgba(0, 0, 0, 0.08);
            --accent: #2563EB;
            --accent-hover: #1D4ED8;
        }

        /* --- MODERN GLOBAL SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-base);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--accent), var(--accent-hover));
            border-radius: 10px;
            border: 2px solid var(--bg-base);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            background-size: cover;
            background-repeat: no-repeat;
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Ambient floating shapes */
        .ambient-shape-1 {
            position: absolute;
            top: -10%;
            right: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .ambient-shape-2 {
            position: absolute;
            bottom: -10%;
            left: -5%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .box {
            background: var(--surface-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 56px 48px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-subtle);
            position: relative;
            z-index: 10;
        }


        h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        h2 i {
            color: var(--accent);
            font-style: normal;
            font-weight: 300;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 15px;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        input::placeholder {
            color: #6B7280;
            font-weight: 400;
        }

        input:focus {
            border-color: var(--border-active);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1), inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-pill);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 16px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.3);
        }

        button:disabled {
            background: var(--border-subtle);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        p {
            font-size: 14px;
            margin-top: 32px;
            color: var(--text-secondary);
        }

        a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        a:hover {
            color: var(--accent);
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 32px;
            color: var(--text-secondary);
            font-size: 13px;
            text-decoration: none;
            border: 1px solid var(--border-subtle);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            transition: 0.3s;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.02);
            width: auto;
        }

        .home-link:hover {
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Steps System */
        .step {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .step.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 14px;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .message.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .otp-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .otp-inputs input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            padding: 0;
            margin-bottom: 0;
            border-radius: var(--radius-md);
        }

        /* Hide number arrows */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        @media (max-width: 1199px) {
            .box {
                padding: 60px 40px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .box {
                padding: 40px 24px;
                border-radius: 20px;
                width: 100%;
            }

            h2 {
                font-size: 24px;
            }

            /* Native App Touch Targets */
            input,
            button {
                min-height: 48px;
                font-size: 16px !important;
            }

            .otp-inputs {
                gap: 8px;
            }

            .otp-inputs input {
                width: 40px;
                height: 50px;
                font-size: 20px;
            }
        }

        /* Language Switcher in Forgot Pass */
        .lang-switcher-forgot {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 100;
        }

        .lang-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border-subtle);
            transition: 0.3s;
            cursor: pointer;
        }

        .lang-link:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="ambient-shape-1"></div>
    <div class="ambient-shape-2"></div>

    <div class="lang-switcher-forgot" style="display: flex; gap: 8px;">
        <div class="lang-link" onclick="window.toggleTheme()" style="cursor: pointer;">
            <i class="fas fa-sun theme-sun"></i>
            <i class="fas fa-moon theme-moon"></i>
        </div>
        <div class="lang-link" onclick="window.toggleLanguage()" style="cursor: pointer;">
            <i class="fas fa-language"></i> <span id="langSwitcherTrigger">EN</span>
        </div>
    </div>

    <div class="box">

        <!-- STEP 1: Email Input -->
        <div id="step1" class="step active">
            <h2><i data-i18n="reset-pass-title-i">Reset</i> <span data-i18n="reset-pass-title-tail">Password</span></h2>
            <p class="subtitle" style="margin-top: -10px;" data-i18n="reset-pass-subtitle">Enter your email to receive
                an OTP</p>

            <div id="msg1" class="message"></div>

            <div class="input-group">
                <input type="email" id="resetEmail" placeholder="Enter your email address"
                    data-i18n="reset-email-placeholder">
            </div>

            <button id="btnStep1" onclick="sendOtp()">
                <span id="textStep1" data-i18n="send-otp-btn">Send OTP</span>
                <div id="loader1" class="loader"></div>
            </button>
            <a href="login.html" class="home-link"><i class="fas fa-arrow-left"></i> <span
                    data-i18n="back-to-login">Back to Login</span></a>
        </div>

        <!-- STEP 2: OTP Verification -->
        <div id="step2" class="step">
            <h2><i data-i18n="verify-otp-title-i">Verify</i> <span data-i18n="verify-otp-title-tail">OTP</span></h2>
            <p class="subtitle" style="margin-top: -10px;"><span data-i18n="verify-otp-subtitle">Enter the 6-digit code
                    sent to </span><br><b id="displayEmail" style="color:white"></b></p>

            <div id="msg2" class="message"></div>

            <div class="otp-inputs" id="otpContainer">
                <input type="number" class="otp-box" maxlength="1" onkeyup="moveToNext(this, event)">
                <input type="number" class="otp-box" maxlength="1" onkeyup="moveToNext(this, event)">
                <input type="number" class="otp-box" maxlength="1" onkeyup="moveToNext(this, event)">
                <input type="number" class="otp-box" maxlength="1" onkeyup="moveToNext(this, event)">
                <input type="number" class="otp-box" maxlength="1" onkeyup="moveToNext(this, event)">
                <input type="number" class="otp-box" maxlength="1" onkeyup="moveToNext(this, event)">
            </div>

            <button id="btnStep2" onclick="verifyOtp()">
                <span id="textStep2" data-i18n="verify-code-btn">Verify Code</span>
                <div id="loader2" class="loader"></div>
            </button>

            <p style="margin-top: 24px;"><span data-i18n="no-code-received">Didn't receive code? </span><a href="#"
                    onclick="resendOtp()" data-i18n="resend-link">Resend</a></p>
        </div>

        <!-- STEP 3: New Password -->
        <div id="step3" class="step">
            <h2><i data-i18n="new-pass-title-i">New</i> <span data-i18n="new-pass-title-tail">Password</span></h2>
            <p class="subtitle" style="margin-top: -10px;" data-i18n="new-pass-subtitle">Create a new secure password
            </p>

            <div id="msg3" class="message"></div>

            <div class="input-group">
                <input type="password" id="newPassword" placeholder="New Password">
            </div>
            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirm Password">
            </div>

            <button id="btnStep3" onclick="updatePassword()">
                <span id="textStep3" data-i18n="confirm-pass-btn">Confirm Password</span>
                <div id="loader3" class="loader"></div>
            </button>
        </div>

    </div>

    <script>
        let currentEmail = "";

        // Helper to show messages
        function showMessage(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'message ' + type;
        }

        // Helper to set loading state
        function setLoading(stepNum, isLoading) {
            const btn = document.getElementById(`btnStep${stepNum}`);
            const text = document.getElementById(`textStep${stepNum}`);
            const loader = document.getElementById(`loader${stepNum}`);

            if (isLoading) {
                btn.disabled = true;
                text.style.display = 'none';
                loader.style.display = 'block';
            } else {
                btn.disabled = false;
                text.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        // Step 1: Send OTP
        async function sendOtp() {
            const email = document.getElementById('resetEmail').value.trim().toLowerCase();
            if (!email) {
                showMessage('msg1', 'Please enter your email', 'error');
                return;
            }

            setLoading(1, true);

            try {
                const response = await fetch(`${API_BASE}/api/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage('msg1', data.error || 'Failed to send OTP.', 'error');
                    setLoading(1, false);
                    return;
                }

                currentEmail = email;

                // Transition to Step 2
                document.getElementById('displayEmail').textContent = email;
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');

                if (window.i18n) window.i18n.updateDOM(window.currentLang || 'en');
            } catch (err) {
                console.error(err);
                showMessage('msg1', 'Server connection failed.', 'error');
            }

            setLoading(1, false);
        }

        async function resendOtp() {
            if (!currentEmail) return;
            try {
                const response = await fetch(`${API_BASE}/api/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail })
                });

                if (response.ok) {
                    showMessage('msg2', 'OTP Resent successfully!', 'success');
                } else {
                    const data = await response.json();
                    showMessage('msg2', data.error || 'Failed to resend OTP.', 'error');
                }
            } catch (err) {
                showMessage('msg2', 'Connection error.', 'error');
            }
        }

        // OTP Input Auto-advance logic
        function moveToNext(current, event) {
            // Only allow numbers
            current.value = current.value.replace(/[^0-9]/g, '');

            if (current.value.length >= 1) {
                const next = current.nextElementSibling;
                if (next) next.focus();
            }

            // Handle Backspace
            if (event.key === "Backspace" && current.value === "") {
                const prev = current.previousElementSibling;
                if (prev) {
                    prev.focus();
                    prev.value = ""; // Clear previous on backtrack
                }
            }
        }

        let resetToken = null; // Store temp token

        // Step 2: Verify OTP
        async function verifyOtp() {
            const inputs = document.querySelectorAll('.otp-box');
            let enteredOtp = '';
            inputs.forEach(input => enteredOtp += input.value);

            if (enteredOtp.length !== 6) {
                showMessage('msg2', 'Please enter all 6 digits', 'error');
                return;
            }

            setLoading(2, true);

            try {
                const response = await fetch(`${API_BASE}/api/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, otp: enteredOtp })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage('msg2', data.error || 'Invalid code. Please try again.', 'error');
                } else {
                    resetToken = data.token; // Save backend verification jwt
                    // Success!
                    document.getElementById('step2').classList.remove('active');
                    document.getElementById('step3').classList.add('active');
                    if (window.i18n) window.i18n.updateDOM(window.currentLang || 'en');
                }

            } catch (err) {
                console.error(err);
                showMessage('msg2', 'Error verifying code.', 'error');
            }

            setLoading(2, false);
        }

        // Step 3: Update Password
        async function updatePassword() {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (!newPass) {
                showMessage('msg3', 'Please enter a new password', 'error');
                return;
            }

            if (newPass !== confirmPass) {
                showMessage('msg3', 'Passwords do not match', 'error');
                return;
            }

            setLoading(3, true);

            try {
                const response = await fetch(`${API_BASE}/api/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resetToken, newPassword: newPass })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage('msg3', data.error || 'Failed to update password.', 'error');
                    setLoading(3, false);
                    return;
                }

                showMessage('msg3', 'Password updated! Redirecting to login...', 'success');

                // Wait 2 seconds then redirect to login
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (err) {
                console.error(err);
                showMessage('msg3', 'Network error.', 'error');
                setLoading(3, false);
            }
        }
    </script>
    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav" aria-label="Mobile Navigation">
        <a href="index.html" class="mbn-item" title="Home">
            <i class="fas fa-house"></i>
            <span class="mbn-label">Home</span>
        </a>
        <a href="service.html" class="mbn-item" title="Services">
            <i class="fas fa-screwdriver-wrench"></i>
            <span class="mbn-label">Services</span>
        </a>
        <a href="service.html" class="mbn-item mbn-center" title="Book Now">
            <div class="mbn-center-bg"><i class="fas fa-calendar-check"></i></div>
        </a>
        <a href="track.html" class="mbn-item" title="Track">
            <i class="fas fa-truck-fast"></i>
            <span class="mbn-label">Track</span>
        </a>
        <a href="login.html" class="mbn-item active" title="Account">
            <i class="fas fa-circle-user"></i>
            <span class="mbn-label">Account</span>
        </a>
    </nav>

</body>

</html>
